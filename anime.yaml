downloader:
  provider: qbittorrent
  url: http://localhost:9091/api/v2
  category: animespace

storage:
  default:
    driver: aliyundrive
    directory: /anime
    token: !env ALIYUNDRIVE_REFRESH_TOKEN
    endpoint: https://api.oplist.org/alicloud/renewapi
  # pikpak:
  #   driver: webdav
  #   url: https://openlist.onekuma.cn/dav
  #   directory: /pikpak/anime
  #   username: admin
  #   password: !env OPENLIST_PASSWORD

preference:
  template:
    动画: '{title} S{season}E{ep} {{fansub}}'
    电影: '{title} {{fansub}}'

  animegarden:
    fansub:
      - Prejudice-Studio
      - LoliHouse
      - 喵萌奶茶屋
      - ANi

  order:
    keywords:
      language:
        - 简
        - CHS
        - 繁
        - CHT
      fansub:
        - '内嵌'
        - '内封'
      resolution:
        - '2160'
        - '1080'
        - '720'
      format:
        - mkv
        - mp4

collections:
  - collections/*.yaml
